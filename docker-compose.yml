version: '3.9'

# ─── AJIO Clone + ML Service — Docker Compose ─────────────────────────────────
# Adds ml_service container to your existing stack
# Run: docker compose up --build -d

services:

  # ── MongoDB (unchanged) ───────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: ajio_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: ajio_clone
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ajio_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── ML Microservice (NEW) ─────────────────────────────────────────────────────
  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: ajio_ml
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongo:27017/ajio_clone?authSource=admin
      MONGO_DB: ajio_clone
      ML_API_KEY: ${ML_API_KEY:-internal_ml_secret}
      NODE_BACKEND_URL: http://backend:5000
      MODEL_PATH: /app/saved_models/recommender.pkl
    volumes:
      - ml_models:/app/saved_models   # persist trained model across restarts
    ports:
      - "8000:8000"                   # expose for debugging; remove in production
    networks:
      - ajio_net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Backend (add ML_SERVICE_URL env var) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ajio_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      ml_service:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongo:27017/ajio_clone?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRE: ${JWT_EXPIRE:-30d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      # ── NEW: ML service connection ────────────────────────────────────────────
      ML_SERVICE_URL: http://ml_service:8000
      ML_API_KEY: ${ML_API_KEY:-internal_ml_secret}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - ajio_net
    healthcheck:
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:5000/api/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend (unchanged) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: ajio_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - ajio_net

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  ajio_net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
  ml_models:           # NEW: persists the trained recommender.pkl
    driver: local
